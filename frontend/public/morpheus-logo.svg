<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background radial gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e0a3c" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Purple-to-cyan arc gradient -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed" />
      <stop offset="50%"  stop-color="#a78bfa" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>

    <!-- Crescent glow gradient -->
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>

    <!-- Inner glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft outer glow -->
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Clip for outer circle -->
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="170" />
    </clipPath>
  </defs>

  <!-- ── Outer ring glow ── -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.3" filter="url(#softGlow)" />

  <!-- ── Main background circle ── -->
  <circle cx="200" cy="200" r="170" fill="url(#bgGlow)" />

  <!-- ── Subtle concentric rings ── -->
  <circle cx="200" cy="200" r="155" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.12" />
  <circle cx="200" cy="200" r="135" fill="none" stroke="#a78bfa" stroke-width="0.5" opacity="0.08" />

  <!-- ── Outer border arc (gradient) ── -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#arcGrad)" stroke-width="2.5" opacity="0.9" />

  <!-- ── Dream waves (background) ── -->
  <g clip-path="url(#circleClip)" opacity="0.18">
    <path d="M 30 210 Q 95 175 160 210 Q 225 245 290 210 Q 355 175 400 210" fill="none" stroke="#a78bfa" stroke-width="1.5" />
    <path d="M 30 230 Q 95 195 160 230 Q 225 265 290 230 Q 355 195 400 230" fill="none" stroke="#a78bfa" stroke-width="1.5" />
    <path d="M 30 250 Q 95 215 160 250 Q 225 285 290 250 Q 355 215 400 250" fill="none" stroke="#7c3aed" stroke-width="1" />
    <path d="M 30 190 Q 95 155 160 190 Q 225 225 290 190 Q 355 155 400 190" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.6" />
  </g>

  <!-- ── Crescent moon (core symbol) ── -->
  <!-- Outer moon disc -->
  <circle cx="200" cy="155" r="72" fill="url(#moonGrad)" filter="url(#glow)" opacity="0.95" />
  <!-- Cut-out to form crescent -->
  <circle cx="228" cy="143" r="62" fill="url(#bgGlow)" />

  <!-- ── Small dot accent (star / pill) ── -->
  <circle cx="272" cy="118" r="5" fill="#22d3ee" opacity="0.9" filter="url(#glow)" />
  <circle cx="255" cy="100" r="3" fill="#a78bfa" opacity="0.7" />
  <circle cx="285" cy="105" r="2.5" fill="#c4b5fd" opacity="0.5" />

  <!-- ── Horizontal divider ── -->
  <line x1="80" y1="242" x2="320" y2="242" stroke="url(#arcGrad)" stroke-width="0.8" opacity="0.4" />

  <!-- ── Wordmark: MORPHEUS ── -->
  <text
    x="200" y="288"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="38"
    font-weight="800"
    letter-spacing="10"
    text-anchor="middle"
    fill="url(#arcGrad)"
    filter="url(#glow)"
  >MORPHEUS</text>

  <!-- ── Tagline ── -->
  <text
    x="200" y="316"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="4"
    text-anchor="middle"
    fill="#475569"
  >OPIOID POLICY SIMULATOR</text>

  <!-- ── Bottom cyan accent dots ── -->
  <circle cx="155" cy="338" r="2" fill="#22d3ee" opacity="0.5" />
  <circle cx="163" cy="338" r="2" fill="#22d3ee" opacity="0.3" />
  <circle cx="237" cy="338" r="2" fill="#22d3ee" opacity="0.3" />
  <circle cx="245" cy="338" r="2" fill="#22d3ee" opacity="0.5" />
  <line x1="168" y1="338" x2="232" y2="338" stroke="#22d3ee" stroke-width="0.8" opacity="0.2" />
</svg>
